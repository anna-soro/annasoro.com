server {
    listen 80 default_server;
    server_name annasoro.com www.annasoro.com _;

    root  /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/xml
        application/javascript
        application/json
        image/svg+xml;

    location ~* ^/dist/(images|video)/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    location ~* ^/dist/css/pages/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Vendor bundle: stable filename, can change silently on re-export — do not mark immutable.
    location ~* ^/dist/(css/main\.css|js/main\.js)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600";
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Extensionless URLs: /about resolves to about.html. Existing internal links
    # keep working unchanged since they already request the .html file directly.
    location / {
        try_files $uri $uri.html $uri/ =404;
        add_header Cache-Control "public, max-age=300" always;
    }
}
